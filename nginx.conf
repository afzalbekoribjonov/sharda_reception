server {
    listen 80;
    server_name localhost;

    # Serve the static WebApp
    location /webapp/ {
        alias /usr/share/nginx/html/webapp/;
        index index.html;
        try_files $uri $uri/ /webapp/index.html;
    }

    # Proxy all other requests to the bot (webhooks, health checks)
    location / {
        proxy_pass http://app:10000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Increase client body size for file uploads if needed
    client_max_body_size 20M;
}
