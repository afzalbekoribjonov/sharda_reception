<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>Sharda University Uzbekistan</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="wrap">
    <header class="top-brand">
      <div class="university-header">
        <div class="logo-box">
          <img src="./logo.png" alt="Sharda University">
        </div>
        <div class="university-name">
          <h1>Sharda University Uzbekistan</h1>
        </div>
      </div>
      <div class="lang-switcher" id="langSwitcher">
        <button type="button" data-lang="uz" title="O'zbekcha">
          <svg width="20" height="15" viewBox="0 0 500 250">
            <rect width="500" height="250" fill="#fff"/>
            <rect width="500" height="83" fill="#0099b5"/>
            <rect y="167" width="500" height="83" fill="#1eb53a"/>
            <rect y="81" width="500" height="5" fill="#ce1126"/>
            <rect y="164" width="500" height="5" fill="#ce1126"/>
            <circle cx="45" cy="42" r="30" fill="#fff"/>
            <circle cx="60" cy="42" r="30" fill="#0099b5"/>
            <g fill="#fff">
              <circle cx="105" cy="22" r="5"/><circle cx="125" cy="22" r="5"/><circle cx="145" cy="22" r="5"/>
              <circle cx="105" cy="42" r="5"/><circle cx="125" cy="42" r="5"/><circle cx="145" cy="42" r="5"/>
              <circle cx="105" cy="62" r="5"/><circle cx="125" cy="62" r="5"/><circle cx="145" cy="62" r="5"/>
              <circle cx="85" cy="42" r="5"/><circle cx="85" cy="62" r="5"/><circle cx="65" cy="62" r="5"/>
            </g>
          </svg>
        </button>
        <button type="button" data-lang="ru" title="Русский">
          <svg width="20" height="15" viewBox="0 0 900 600">
            <rect width="900" height="600" fill="#fff"/>
            <rect width="900" height="400" y="200" fill="#0039a6"/>
            <rect width="900" height="200" y="400" fill="#d52b1e"/>
          </svg>
        </button>
        <button type="button" data-lang="en" title="English">
          <svg width="20" height="15" viewBox="0 0 7410 3900">
            <rect width="7410" height="3900" fill="#b22234"/>
            <path d="M0,450H7410M0,1050H7410M0,1650H7410M0,2250H7410M0,2850H7410M0,3450H7410" stroke="#fff" stroke-width="300"/>
            <rect width="2964" height="2100" fill="#3c3b6e"/>
            <g fill="#fff">
              <g id="s18"><g id="s9"><g id="s5"><g id="s"><polygon id="star" points="0,-130 76,105 -124,-39 124,-39 -76,105"/></g><use xlink:href="#s" x="494"/><use xlink:href="#s" x="988"/><use xlink:href="#s" x="1482"/><use xlink:href="#s" x="1976"/></g><use xlink:href="#s5" x="247"/></g><use xlink:href="#s9" y="420"/><use xlink:href="#s9" y="840"/><use xlink:href="#s9" y="1260"/><use xlink:href="#s9" y="1680"/></g>
              <use xlink:href="#s18" x="247" y="210"/>
            </g>
          </svg>
        </button>
      </div>
    </header>

    <main class="main-card">
      <div class="welcome-section">
        <h2 id="t_title">Ro‘yxatdan o‘tish</h2>
        <p id="t_subtitle">Ma’lumotlarni kiriting</p>
      </div>

      <div class="info-alert" id="t_hint">
        Bu ma’lumotlar ro‘yxatdan o‘tishni davom ettirish uchun kerak bo‘ladi.
      </div>

      <form id="form" novalidate>
        <div class="form-group">
          <label for="fullName" id="t_name_label">Ism familiya</label>
          <div class="input-container">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <input id="fullName" name="fullName" type="text" autocomplete="name"
                   placeholder="Ism familiya" />
          </div>
          <div class="error-msg" id="errName"></div>
        </div>

        <div class="form-group">
          <label for="phone" id="t_phone_label">Telefon raqam</label>
          <div class="input-container">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            <span class="country-prefix">+998</span>
            <input id="phone" name="phone" inputmode="numeric" autocomplete="tel"
                   placeholder="90 123 45 67" />
          </div>
          <div class="error-msg" id="errPhone"></div>
        </div>

        <div class="button-stack">
          <button class="primary-btn" id="submitBtn" type="submit">
            <span id="t_submit">Yuborish</span>
            <span class="loading-spinner" id="spinner" aria-hidden="true"></span>
          </button>

          <button class="secondary-btn" id="closeBtn" type="button">
            <span id="t_close">Yopish</span>
          </button>
        </div>

        <div class="security-footer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          <span id="t_footer">Ma’lumotlar xavfsiz saqlanadi.</span>
        </div>
      </form>
    </main>

    <div class="notification-toast" id="toast" role="status" aria-live="polite"></div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./app.js"></script>
</body>
</html>
