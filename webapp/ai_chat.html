<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>Suuz Agent - Sharda University</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { background-color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    .chat-container { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; }
    
    .chat-header {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
    }
    .agent-info { flex: 1; }
    .agent-info h1 { font-size: 15px; font-weight: 800; margin: 0; color: var(--sharda-blue); }
    .status-indicator { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #00a400; font-weight: 600; }
    .status-dot { width: 8px; height: 8px; background: #00a400; border-radius: 50%; animation: pulse 1.5s infinite; }
    
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    .bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; }
    .bubble.user { align-self: flex-end; background: var(--sharda-blue); color: #fff; border-bottom-right-radius: 4px; }
    .bubble.agent { align-self: flex-start; background: #f0f2f5; color: #1c1e21; border-bottom-left-radius: 4px; }
    
    .typing-indicator { align-self: flex-start; background: #f0f2f5; padding: 12px 16px; border-radius: 18px; display: none; gap: 4px; }
    .dot { width: 6px; height: 6px; background: #8d949e; border-radius: 50%; animation: bounce 1.3s infinite; }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }

    .input-area { padding: 12px 16px; border-top: 1px solid #eee; display: flex; gap: 10px; background: #fff; }
    .chat-input { flex: 1; border: 1px solid #ddd; border-radius: 24px; padding: 10px 18px; outline: none; font-size: 15px; }
    .send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--sharda-blue); color: #fff; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .send-btn svg { margin-left: 2px; }
  </style>
</head>
<body>
  <header class="chat-header">
    <div class="logo-box" style="width: 40px; height: 40px;">
      <img src="./logo.png" alt="SUUZ">
    </div>
    <div class="agent-info">
      <h1>Suuz Agent</h1>
      <div class="status-indicator">
        <span class="status-dot"></span>
        <span>Online</span>
      </div>
    </div>
  </header>

  <div class="chat-container" id="chatBox">
    <!-- Messages appear here -->
  </div>

  <div class="typing-indicator" id="typing">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <form class="input-area" id="chatForm">
    <input type="text" class="chat-input" id="userInput" placeholder="Savolingizni yozing..." autocomplete="off" />
    <button type="submit" class="send-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </form>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./ai_chat.js"></script>
</body>
</html>
