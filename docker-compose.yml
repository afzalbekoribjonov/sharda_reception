version: '3.8'

services:
  db:
    image: mongo:latest
    container_name: sharda_db
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  app:
    build: .
    container_name: sharda_app
    restart: always
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://db:27017
      - MONGO_DB=${MONGO_DB:-suuz_bot}
    depends_on:
      - db
    volumes:
      - ./tmp_exports:/app/tmp_exports

  nginx:
    image: nginx:alpine
    container_name: sharda_nginx
    restart: always
    volumes:
      - ./webapp:/usr/share/nginx/html/webapp
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  mongo_data:
